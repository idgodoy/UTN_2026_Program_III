<!DOCTYPE html>
<html>
<head>  
    <script>
        function agregarTexto() {
        miTexto.innerHTML += "<br> Y Otro...";
        }
 function cambiaNumero() {
 const numero = document.getElementById("numero");
 numero.innerHTML = "Número cambiado a: " + Math.floor(Math.random() * 100);
        }
    </script>    
</head>


<body>
    <h2>JavaScript HTML DOM</h2>
    <h3>Usando getElementById() e innerHTML</h3>

<p id="parrafo"></p>

<p id="numero">Númerddfgdfgdfgo original: 0</p>

<script>
const miTexto = document.getElementById("parrafo");

miTexto.innerHTML = "Texto agregado usando innerHTML y getElementById() <br>";

miTexto.innerHTML += " Otro texto agregado";
</script>


<input type="button" value="Agregar texto" onclick="agregarTexto()">
<input type="button" value="Cambiar número" onclick="cambiaNumero()">   
</body>
</html>
