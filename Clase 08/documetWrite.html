<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document.write()</title>
        <script>
            function mostrarMensaje() {
                document.write("Hola Mundo");
                document.write("<p><h1>Desdde JScript</h1></p> ");
                document.write("<input type='text' placeholder='Ingrese su nombre'> ");
            }
        </script>
</head>

<body>
   <h1>Ejemplo de document.write()</h1>
<script>
 
 mostrarMensaje();
</script>

<p> <input type="button" value="Mostrar mensaje" onclick="mostrarMensaje()">   
</p>

</body>
